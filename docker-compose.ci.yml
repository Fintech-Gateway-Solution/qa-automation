##
# CI Test Environment — spins up the full fintech stack for pre-deploy QA testing.
# Used by qa-gate.yml workflow. Containers are destroyed after each run.
#
# IMPORTANT: Services share a single Postgres DB but use independent drizzle
# migration journals. The qa-gate.yml workflow clears the migration tracking
# table between service startups to prevent cross-service migration conflicts.
##

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fintech
      POSTGRES_PASSWORD: ci-test-password
      POSTGRES_DB: fintech
    command: >
      postgres
        -c shared_buffers=64MB
        -c effective_cache_size=128MB
        -c max_connections=20
        -c work_mem=2MB
        -c wal_buffers=2MB
    tmpfs:
      - /dev/shm:size=128M
    healthcheck:
      test: pg_isready -U fintech
      interval: 3s
      timeout: 2s
      retries: 10
    ports:
      - "5432:5432"

  auth:
    image: ghcr.io/fintech-gateway-solution/auth:dev-latest
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: "3001"
      HOST: 0.0.0.0
      NODE_ENV: production
      DATABASE_URL: postgres://fintech:ci-test-password@db:5432/fintech
      JWT_SECRET: ci-jwt-secret-for-testing-only
      INTERNAL_API_KEY: ci-internal-api-key
      CORS_ORIGINS: http://localhost:8080
      COOKIE_SECURE: "false"
      COOKIE_SAMESITE: lax
      FRONTEND_URL: http://localhost:8080
      RUN_MIGRATIONS: "true"
      RESEND_API_KEY: ""
      EMAIL_FROM: noreply@test.local
      NODE_OPTIONS: --max-old-space-size=192
      DB_POOL_MAX: "2"
      DB_IDLE_TIMEOUT: "20"
      DB_APPLICATION_NAME: auth
    healthcheck:
      test: wget -q --spider http://127.0.0.1:3001/api/v1/health || exit 1
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 30s
    ports:
      - "3001:3001"

  api:
    image: ghcr.io/fintech-gateway-solution/dashboard/api:dev-latest
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: "3000"
      HOST: 0.0.0.0
      NODE_ENV: production
      DATABASE_URL: postgres://fintech:ci-test-password@db:5432/fintech
      TENANT_MODE: header
      DEFAULT_TENANT_ID: "00000000-0000-0000-0000-000000000001"
      JWT_SECRET: ci-jwt-secret-for-testing-only
      AUTH_SERVICE_URL: http://auth:3001/api/v1
      INTERNAL_API_KEY: ci-internal-api-key
      CORS_ORIGINS: http://localhost:8080
      RUN_MIGRATIONS: "true"
      NODE_OPTIONS: --max-old-space-size=192
      DB_POOL_MAX: "2"
      DB_IDLE_TIMEOUT: "20"
      DB_APPLICATION_NAME: dashboard-api
    healthcheck:
      test: wget -q --spider http://127.0.0.1:3000/api/v1/health || exit 1
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 30s
    ports:
      - "3000:3000"

  sendpayment:
    image: ghcr.io/fintech-gateway-solution/sendpayment:dev-latest
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: "3002"
      HOST: 0.0.0.0
      NODE_ENV: production
      DATABASE_URL: postgres://fintech:ci-test-password@db:5432/fintech
      JWT_SECRET: ci-jwt-secret-for-testing-only
      INTERNAL_API_KEY: ci-internal-api-key
      CORS_ORIGINS: http://localhost:8080
      RUN_MIGRATIONS: "true"
      NODE_OPTIONS: --max-old-space-size=192
      DB_POOL_MAX: "2"
      DB_IDLE_TIMEOUT: "20"
      DB_APPLICATION_NAME: sendpayment
    healthcheck:
      test: wget -q --spider http://127.0.0.1:3002/api/v1/health || exit 1
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 30s
    ports:
      - "3002:3002"

  receivepayment:
    image: ghcr.io/fintech-gateway-solution/receivepayment:dev-latest
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: "3003"
      HOST: 0.0.0.0
      NODE_ENV: production
      DATABASE_URL: postgres://fintech:ci-test-password@db:5432/fintech
      JWT_SECRET: ci-jwt-secret-for-testing-only
      INTERNAL_API_KEY: ci-internal-api-key
      CORS_ORIGINS: http://localhost:8080
      ENABLE_SWAGGER: "false"
      RUN_MIGRATIONS: "true"
      NODE_OPTIONS: --max-old-space-size=192
      DB_POOL_MAX: "2"
      DB_IDLE_TIMEOUT: "20"
      DB_APPLICATION_NAME: receivepayment
    healthcheck:
      test: wget -q --spider http://127.0.0.1:3003/api/v1/health || exit 1
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 30s
    ports:
      - "3003:3003"

  products:
    image: ghcr.io/fintech-gateway-solution/products:dev-latest
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: "3004"
      HOST: 0.0.0.0
      NODE_ENV: production
      DATABASE_URL: postgres://fintech:ci-test-password@db:5432/fintech
      JWT_SECRET: ci-jwt-secret-for-testing-only
      CORS_ORIGINS: http://localhost:8080
      RUN_MIGRATIONS: "true"
      NODE_OPTIONS: --max-old-space-size=192
      DB_POOL_MAX: "2"
      DB_IDLE_TIMEOUT: "20"
      DB_APPLICATION_NAME: products
    # Override CMD: skip strict migration validation in CI (shared DB journal mismatch)
    command: ["sh", "-c", "node pre-migrate.mjs && npx drizzle-kit migrate 2>&1 || echo 'WARN: drizzle-kit migration issue'; exec node dist/index.js"]
    healthcheck:
      test: wget -q --spider http://127.0.0.1:3004/api/v1/health || exit 1
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 30s
    ports:
      - "3004:3004"

  sync:
    image: ghcr.io/fintech-gateway-solution/sync:dev-latest
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: "3006"
      HOST: 0.0.0.0
      NODE_ENV: production
      DATABASE_URL: postgres://fintech:ci-test-password@db:5432/fintech
      TENANT_MODE: header
      DEFAULT_TENANT_ID: "00000000-0000-0000-0000-000000000001"
      JWT_SECRET: ci-jwt-secret-for-testing-only
      CORS_ORIGINS: http://localhost:8080
      DB_POOL_MAX: "2"
      DB_IDLE_TIMEOUT: "20"
      DB_APPLICATION_NAME: sync
    healthcheck:
      test: wget -q --spider http://127.0.0.1:3006/api/v1/health || exit 1
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 30s
    ports:
      - "3006:3006"

  web:
    image: ghcr.io/fintech-gateway-solution/dashboard/web:dev-latest
    depends_on:
      - api
    environment:
      DOMAIN_NAME: localhost
    ports:
      - "8080:80"
