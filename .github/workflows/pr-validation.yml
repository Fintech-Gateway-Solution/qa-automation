##
# PR Validation
#
# Validates that test files compile and Playwright config is valid
# when changes are made to the qa-automation repo itself.
##

name: PR Validation

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Playwright config validation
        run: npx playwright test --list
