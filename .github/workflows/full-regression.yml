##
# Full Regression Suite
#
# Runs all tests (smoke + regression) against the live dev environment.
# Scheduled nightly and available for manual dispatch.
##

name: Full Regression

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL to test against'
        default: 'https://findev.qpaymentz.com'
      grep:
        description: 'Optional grep filter (e.g., @auth, @smoke)'
        default: ''

concurrency:
  group: full-regression
  cancel-in-progress: false

env:
  BASE_URL: ${{ inputs.base_url || 'https://findev.qpaymentz.com' }}

jobs:
  regression:
    name: Full Regression Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run full regression
        run: |
          GREP_ARG=""
          if [ -n "${{ inputs.grep }}" ]; then
            GREP_ARG="--grep ${{ inputs.grep }}"
          fi
          npx playwright test $GREP_ARG
        env:
          BASE_URL: ${{ env.BASE_URL }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-report-${{ github.run_number }}
          path: playwright-report/
          retention-days: 30
