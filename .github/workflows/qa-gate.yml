##
# Reusable QA Gate Workflow
#
# Called by each service repo's deploy-dev.yml BEFORE deploying to dev EC2.
# Spins up the full service stack in the CI runner using docker-compose.ci.yml,
# overrides the image for the service being deployed with the newly built tag,
# runs Playwright smoke tests, and tears everything down.
#
# If tests fail, the calling workflow's deploy job is blocked.
#
# Migration strategy: All services use per-migration-transaction runners that
# track applied migrations by journal timestamp. Multiple services can safely
# share one __drizzle_migrations table without clearing between starts.
##

name: QA Gate

on:
  workflow_call:
    inputs:
      service:
        description: 'Service being deployed (auth, dashboard, sendpayment, receivepayment, products, pos-backend)'
        required: true
        type: string
      image-tag:
        description: 'Docker image tag for the newly built service (e.g., dev-abc1234)'
        required: true
        type: string
    secrets:
      GHCR_PAT:
        required: true
        description: 'Org-wide PAT for pulling all service images from GHCR'

jobs:
  qa-gate:
    name: "QA Gate (${{ inputs.service }})"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout qa-automation repo
        uses: actions/checkout@v4
        with:
          repository: Fintech-Gateway-Solution/qa-automation
          ref: main

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: fintech-gateway
          password: ${{ secrets.GHCR_PAT }}

      - name: Override image for deployed service
        run: |
          SERVICE="${{ inputs.service }}"
          TAG="${{ inputs.image-tag }}"
          echo "Overriding $SERVICE image to tag: $TAG"

          case "$SERVICE" in
            auth)
              sed -i "s|auth:dev-latest|auth:${TAG}|" docker-compose.ci.yml
              ;;
            dashboard)
              sed -i "s|dashboard/api:dev-latest|dashboard/api:${TAG}|" docker-compose.ci.yml
              sed -i "s|dashboard/web:dev-latest|dashboard/web:${TAG}|" docker-compose.ci.yml
              ;;
            sendpayment)
              sed -i "s|sendpayment:dev-latest|sendpayment:${TAG}|" docker-compose.ci.yml
              ;;
            receivepayment)
              sed -i "s|receivepayment:dev-latest|receivepayment:${TAG}|" docker-compose.ci.yml
              ;;
            products)
              sed -i "s|products:dev-latest|products:${TAG}|" docker-compose.ci.yml
              ;;
            pos-backend)
              echo "POS backend not yet in CI compose — skipping override"
              ;;
            sync)
              sed -i "s|sync:dev-latest|sync:${TAG}|" docker-compose.ci.yml
              ;;
            *)
              echo "Unknown service: $SERVICE"
              ;;
          esac

          echo "Updated docker-compose.ci.yml images:"
          grep "image:" docker-compose.ci.yml

      - name: Lint migrations (Dockerfile safety + cross-service timestamp collisions)
        run: |
          echo "Checking Dockerfile safety and journal integrity..."
          # Extract migration journals from all service images for cross-repo validation
          SERVICES="auth dashboard/api products sendpayment receivepayment"
          mkdir -p /tmp/migration-lint

          for SVC in $SERVICES; do
            IMG="ghcr.io/fintech-gateway-solution/${SVC}"
            TAG=$(grep "${SVC}" docker-compose.ci.yml | grep "image:" | sed 's/.*://' | tr -d ' "' || echo "dev-latest")
            DIR_NAME=$(echo "$SVC" | tr '/' '-')
            mkdir -p "/tmp/migration-lint/$DIR_NAME/migrations/meta"

            # Extract journal from Docker image
            CONTAINER=$(docker create "${IMG}:${TAG}" 2>/dev/null || docker create "${IMG}:dev-latest" 2>/dev/null || true)
            if [ -n "$CONTAINER" ]; then
              docker cp "$CONTAINER:/app/migrations/meta/_journal.json" "/tmp/migration-lint/$DIR_NAME/migrations/meta/_journal.json" 2>/dev/null \
                || docker cp "$CONTAINER:/app/src/db/migrations/meta/_journal.json" "/tmp/migration-lint/$DIR_NAME/migrations/meta/_journal.json" 2>/dev/null \
                || echo "WARN: Could not extract journal from $SVC"
              docker rm "$CONTAINER" > /dev/null 2>&1 || true
            fi
          done

          # Run cross-service timestamp collision check
          python3 -c "
          import json, os, sys, glob

          base = '/tmp/migration-lint'
          all_entries = []

          for svc_dir in glob.glob(f'{base}/*/migrations/meta/_journal.json'):
              svc_name = svc_dir.split('/')[-4]
              with open(svc_dir) as f:
                  j = json.load(f)
              for e in j['entries']:
                  all_entries.append((e['when'], svc_name, e['tag']))

          by_ts = {}
          for when, svc, tag in all_entries:
              by_ts.setdefault(when, []).append((svc, tag))

          collisions = {k: v for k, v in by_ts.items() if len(set(s for s,_ in v)) > 1}

          if collisions:
              print('MIGRATION TIMESTAMP COLLISIONS DETECTED:')
              for ts, entries in sorted(collisions.items()):
                  items = ', '.join(f'{s}/{t}' for s, t in entries)
                  print(f'  when={ts}: {items}')
              sys.exit(1)
          else:
              print(f'OK: {len(all_entries)} migrations across {len(set(d.split(\"/\")[-4] for d in glob.glob(f\"{base}/*/migrations/meta/_journal.json\")))} services, no collisions')
          "

      - name: Pull Docker images
        run: docker compose -f docker-compose.ci.yml pull

      - name: Start service stack (sequential to avoid migration conflicts)
        run: |
          COMPOSE="docker compose -f docker-compose.ci.yml"

          wait_healthy() {
            local SVC=$1 MAX=$2 INTERVAL=${3:-3}
            for i in $(seq 1 $((MAX / INTERVAL))); do
              if $COMPOSE ps "$SVC" --format json 2>/dev/null | jq -e 'select(.Health == "healthy")' > /dev/null 2>&1; then
                echo "  $SVC healthy after ~$((i * INTERVAL))s"
                return 0
              fi
              STATE=$($COMPOSE ps "$SVC" --format json 2>/dev/null | jq -r '.State' 2>/dev/null || echo "unknown")
              if [ "$STATE" = "exited" ]; then
                echo "  $SVC exited — dumping logs..."
                $COMPOSE logs "$SVC" --tail 10
                echo "  Restarting $SVC..."
                $COMPOSE up -d --no-deps "$SVC" 2>&1 || true
              fi
              sleep "$INTERVAL"
            done
            echo "  $SVC failed to become healthy within ${MAX}s"
            $COMPOSE logs "$SVC" --tail 20
            return 1
          }

          # All services use per-migration-transaction runners that track
          # by journal timestamp, so the shared __drizzle_migrations table
          # works correctly without clearing between services.

          # Stage 1: DB
          echo "=== Stage 1: Starting database ==="
          $COMPOSE up -d db
          wait_healthy db 60 2

          # Stage 2: Auth (creates auth schema + seeds users)
          echo "=== Stage 2: Starting auth ==="
          $COMPOSE up -d --no-deps auth
          wait_healthy auth 240 3
          if ! $COMPOSE ps auth --format json 2>/dev/null | jq -e 'select(.Health == "healthy")' > /dev/null 2>&1; then
            echo "FATAL: Auth never became healthy — aborting"
            $COMPOSE logs auth --tail 30
            exit 1
          fi

          # Stage 3: Sendpayment first — creates sp_payees table referenced by dashboard API migration 0036
          echo "=== Stage 3: Starting sendpayment ==="
          $COMPOSE up -d --no-deps sendpayment
          wait_healthy sendpayment 90 3

          # Stage 4: Dashboard API (creates tenants, payees, funding_accounts, etc.)
          echo "=== Stage 4: Starting dashboard API ==="
          $COMPOSE up -d --no-deps api
          wait_healthy api 120 3

          # Stage 5: Remaining services (each runs own migrations by timestamp)
          echo "=== Stage 5: Starting remaining services ==="
          $COMPOSE up -d --no-deps products receivepayment sync web
          echo "Waiting 15s for services to initialize..."
          sleep 15

          # Final status
          $COMPOSE ps

      - name: Wait for all services to be healthy
        run: |
          MAX_WAIT=120
          INTERVAL=5
          ELAPSED=0
          REQUIRED_HEALTHY=7  # db, auth, api, sendpayment, receivepayment, products, sync

          while [ "$ELAPSED" -lt "$MAX_WAIT" ]; do
            HEALTHY=$(docker compose -f docker-compose.ci.yml ps --format json 2>/dev/null | jq -s '[.[] | select(.Health == "healthy")] | length' 2>/dev/null || echo "0")
            echo "  [$ELAPSED/${MAX_WAIT}s] $HEALTHY/$REQUIRED_HEALTHY healthy"

            if [ "$HEALTHY" -ge "$REQUIRED_HEALTHY" ]; then
              echo "All services healthy!"
              docker compose -f docker-compose.ci.yml ps
              break
            fi

            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ "$ELAPSED" -ge "$MAX_WAIT" ]; then
            echo "Services failed to become healthy within ${MAX_WAIT}s"
            docker compose -f docker-compose.ci.yml ps
            echo ""
            echo "=== Container Logs ==="
            docker compose -f docker-compose.ci.yml logs --tail 30
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npx playwright test --project=smoke
        env:
          BASE_URL: http://localhost:8080
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-gate-report-${{ inputs.service }}-${{ github.run_number }}
          path: playwright-report/
          retention-days: 14

      - name: Teardown
        if: always()
        run: |
          docker compose -f docker-compose.ci.yml down -v --remove-orphans
